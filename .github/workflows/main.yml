name: Future Net Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # يعيد التشغيل تلقائياً كل 5 ساعات لضمان الاستمرارية

# --- منع التداخل: هذا الجزء يغلق البوت القديم فور بدء الجديد ---
concurrency:
  group: future-net-bot-group
  cancel-in-progress: true
# ---------------------------------------------------------

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: |
          pip install pyTelegramBotAPI google-genai

      - name: Run Future Bot
        # سيتم تشغيل البوت، وعند حلول موعد الـ 5 ساعات القادمة، سيتم إنهاء هذه الجلسة تلقائياً
        run: python bot.py
