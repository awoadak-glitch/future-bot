name: Future Net Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # يعيد التشغيل تلقائياً كل 5 ساعات لضمان الاستمرارية

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libraries
        run: |
          pip install pyTelegramBotAPI google-genai

      - name: Run Future Bot
        # ملاحظة: بما أنك وضعت التوكن داخل الكود، لا نحتاج لتعريف الـ env هنا
        # لكن سأتركها لك كخيار احتياطي إذا قررت العودة للسيكرتس مستقبلاً
        run: python bot.py
